<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<title>드롭 테이블 메이커</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
/* ── 리셋 & 기본 ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  background:#111;color:#e8e8e8;
  font-family:'Segoe UI','Noto Sans KR',system-ui,sans-serif;
  height:100vh;display:flex;flex-direction:column;overflow:hidden;
  font-size:13px;line-height:1.5;
}

/* ── 색 팔레트: 라이트 기본 ── */
:root{
  --bg:   #f7f5f0;
  --s1:   #ffffff;
  --s2:   #f0ede8;
  --s3:   #e8e4de;
  --line: #ddd9d2;
  --t1:   #1a1814;
  --t2:   #6b6660;
  --t3:   #aaa49e;
  --acc:  #9a7c2e;
  --acc2: #7a5e1e;
}

/* ── 상단바 ── */
.topbar{
  background:var(--s1);border-bottom:1px solid var(--line);
  padding:10px 16px;display:flex;align-items:center;gap:12px;flex-shrink:0;
}
.topbar h1{font-size:14px;font-weight:600;color:var(--t1);letter-spacing:.02em}
.topbar h1 span{color:var(--acc)}
.topbar .hint{font-size:11px;color:var(--t3)}

/* ── 레이아웃 ── */
.wrap{display:flex;flex:1;overflow:hidden}

/* ══ LEFT PANEL ══ */
.left{
  width:256px;border-right:1px solid var(--line);background:var(--s1);
  display:flex;flex-direction:column;flex-shrink:0;position:relative;
}
/* 좌측 패널 리사이즈 핸들 */
.left-rsz{
  position:absolute;right:-3px;top:0;bottom:0;width:6px;
  cursor:col-resize;z-index:20;user-select:none;
}
.left-rsz:hover,.left-rsz.dragging{background:rgba(155,125,50,.35)}

.tabs{display:flex;border-bottom:1px solid var(--line);flex-shrink:0}
.tab{
  flex:1;padding:9px 4px;font-size:11px;text-align:center;cursor:pointer;
  color:var(--t2);border:none;border-bottom:2px solid transparent;
  background:none;transition:color .12s,border-color .12s;letter-spacing:.02em;
}
.tab:hover{color:var(--t1)}
.tab.active{color:var(--acc);border-bottom-color:var(--acc)}

.lp-search{padding:8px;border-bottom:1px solid var(--line);display:flex;gap:6px;flex-shrink:0}
.lp-search input{
  flex:1;min-width:0;background:var(--bg);color:var(--t1);
  border:1px solid var(--line);border-radius:4px;
  padding:6px 9px;font-size:12px;outline:none;transition:border-color .12s;
}
.lp-search input:focus{border-color:var(--acc)}

.pool{flex:1;overflow-y:auto;padding:8px;display:flex;flex-wrap:wrap;gap:5px;align-content:flex-start}
.pool::-webkit-scrollbar{width:3px}
.pool::-webkit-scrollbar-thumb{background:var(--line);border-radius:2px}

/* 풀 아이템 */
.pi{
  width:52px;display:flex;flex-direction:column;align-items:center;gap:3px;
  cursor:pointer;border-radius:5px;padding:5px 3px;
  border:1px solid transparent;transition:background .1s,border-color .1s;
}
.pi:hover{background:var(--s3);border-color:var(--acc)}
.pi img{width:42px;height:42px;object-fit:contain;border-radius:3px}
.pi.svt img{border-radius:4px}
.pi .pn{font-size:8px;color:var(--t3);text-align:center;max-width:50px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}

.lp-foot{padding:5px 9px;border-top:1px solid var(--line);font-size:10px;color:var(--t3);flex-shrink:0}

/* ══ RIGHT PANEL ══ */
.right{flex:1;display:flex;flex-direction:column;overflow:hidden}

.toolbar{
  background:var(--s1);border-bottom:1px solid var(--line);
  padding:8px 14px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;flex-shrink:0;
}

.btn{
  background:var(--s2);color:var(--t1);
  border:1px solid var(--line);border-radius:4px;
  padding:5px 12px;font-size:12px;cursor:pointer;
  white-space:nowrap;transition:background .1s,border-color .1s;
}
.btn:hover{background:var(--s3);border-color:var(--t3)}
.btn.save{border-color:var(--acc);color:var(--acc)}
.btn.save:hover{background:var(--acc);color:#111}

.tbtitle{
  background:var(--bg);color:var(--t1);
  border:1px solid var(--line);border-radius:4px;
  padding:5px 10px;font-size:13px;font-weight:600;width:200px;outline:none;
  transition:border-color .12s;
}
.tbtitle:focus{border-color:var(--acc)}
.tb-sel{
  background:var(--bg);color:var(--t2);border:1px solid var(--line);
  border-radius:4px;padding:5px 8px;font-size:11px;cursor:pointer;
}
.sep{width:1px;height:16px;background:var(--line);flex-shrink:0;margin:0 2px}

/* ── 캔버스 영역 ── */
.cvs-scroll{flex:1;overflow:auto;padding:24px 24px 8px;background:var(--bg)}

/* 익스포트 영역 높이 리사이즈 핸들 */
#eaResizer{
  width:100%;height:6px;cursor:row-resize;user-select:none;
  margin-top:3px;border-radius:3px;transition:background .12s;
}
#eaResizer:hover,#eaResizer.dragging{background:rgba(155,125,50,.35)}

/* ── 익스포트 영역 ── */
#exportArea{
  display:inline-block;min-width:360px;
  border-radius:8px;overflow:hidden;
  background:var(--eb,#111);
  border:1px solid var(--eline,#2a2a2a);
}
.ex-hdr{
  padding:10px 16px;
  background:var(--ehb,#1a1a1a);
  border-bottom:1px solid var(--acc,#c8a84b);
}
.ex-ttl{font-size:13px;font-weight:600;color:var(--acc,#c8a84b);letter-spacing:.03em}
.ex-body{padding:8px;display:flex;flex-direction:column;gap:3px}

/* ── 테이블 행 ── */
.trow{
  display:flex;align-items:stretch;
  border-radius:5px;overflow:visible;
  background:var(--rb,#1a1a1a);
  border:1px solid var(--rline,#2a2a2a);
}
.trow.sel{border-color:var(--acc,#c8a84b)}

/* 행 컨트롤 */
.rctrl{display:flex;flex-direction:column;justify-content:center;gap:2px;padding:4px 3px;flex-shrink:0}
.rc{
  background:none;border:none;color:var(--t3);cursor:pointer;
  width:18px;height:18px;font-size:10px;
  display:flex;align-items:center;justify-content:center;
  border-radius:3px;transition:color .1s,background .1s;
}
.rc:hover{background:var(--s3);color:var(--t1)}
.rc.dl:hover{color:#e05555}

/* ── 행 레이블 ── */
.rlabel{
  width:var(--rlw,96px);min-width:0;max-width:none;flex-shrink:0;
  display:flex;align-items:center;gap:5px;padding:6px 8px;
  background:var(--lb,#1f1f1f);
  border-right:1px solid var(--acc,#c8a84b);
  align-self:stretch;position:relative;
}
/* rlabel 너비 리사이즈 핸들 */
.rl-rsz{
  position:absolute;right:-3px;top:0;bottom:0;width:6px;
  cursor:col-resize;z-index:5;user-select:none;
}
.rl-rsz:hover,.rl-rsz.dragging{background:rgba(155,125,50,.4)}

.licon-slot{
  width:36px;height:36px;flex-shrink:0;border-radius:4px;
  border:1px dashed var(--t3);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:border-color .1s;position:relative;overflow:hidden;
  color:var(--t3);font-size:14px;
}
.licon-slot:hover{border-color:var(--acc);color:var(--acc)}
.licon-slot img{width:34px;height:34px;object-fit:contain;border-radius:3px}
.licon-slot.svt img{border-radius:4px}
.licon-slot .ldel{
  display:none;position:absolute;inset:0;
  background:rgba(0,0,0,.75);
  align-items:center;justify-content:center;font-size:12px;color:#e05555;cursor:pointer;
}
.licon-slot:hover .ldel{display:flex}
.ltxt{
  flex:1;min-width:0;background:none;border:none;
  color:var(--ltc,#e8e8e8);font-size:11px;font-weight:500;
  outline:none;width:100%;line-height:1.4;resize:none;font-family:inherit;
}

/* ── 행 아이템 영역 ── */
.ritems{display:flex;flex-wrap:wrap;gap:4px;padding:6px 8px;flex:1;align-items:center;min-height:52px}

/* 아이템 카드 */
.ric{
  width:44px;height:44px;border-radius:5px;
  border:1px solid var(--icbd,#2a2a2a);
  background:var(--icbg,#111);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;position:relative;transition:border-color .1s;flex-shrink:0;
}
.ric:hover{border-color:var(--acc,#c8a84b)}
.ric:hover .rdel{display:flex}
.ric img{width:36px;height:36px;object-fit:contain}
.ric.svt img{border-radius:4px}
.rdel{
  display:none;position:absolute;inset:0;
  background:rgba(0,0,0,.7);border-radius:4px;
  align-items:center;justify-content:center;font-size:13px;color:#e05555;
}
.empty-hint{font-size:10px;color:var(--t3);padding:2px 4px}

/* ── 테마 ── */
.th-dark {--eb:#111;--ehb:#1a1a1a;--rb:#1a1a1a;--lb:#1f1f1f;--rline:#2a2a2a;--eline:#2a2a2a;--icbg:#111;--icbd:#2a2a2a;--acc:#c8a84b;--ltc:#e8e8e8}
.th-warm {--eb:#130e06;--ehb:#1e1508;--rb:#1e1508;--lb:#251a09;--rline:#3a2a10;--eline:#3a2a10;--icbg:#130e06;--icbd:#3a2a10;--acc:#d4924a;--ltc:#e8e0d0}
.th-cool {--eb:#080e18;--ehb:#0e1826;--rb:#0e1826;--lb:#121e30;--rline:#1e3050;--eline:#1e3050;--icbg:#080e18;--icbd:#1e3050;--acc:#6ea8d4;--ltc:#d0dce8}
.th-light{--eb:#f5f5f2;--ehb:#eae8e2;--rb:#eae8e2;--lb:#dedad2;--rline:#d0ccc0;--eline:#d0ccc0;--icbg:#f5f5f2;--icbd:#d0ccc0;--acc:#8a6f28;--ltc:#1a1a1a}

/* ── 레이아웃: 클래스별 (표2) ── */
.tpl-class .ex-body{gap:1px;padding:1px}
.tpl-class .trow{border-radius:0;border-left:none;border-right:none}
.tpl-class .trow:first-child{border-top:1px solid var(--rline,#2a2a2a)}
.tpl-class .rlabel{
  width:var(--rlw,106px);min-width:0;max-width:none;
  flex-direction:column;align-items:center;justify-content:center;
  text-align:center;gap:5px;padding:8px 6px;
  border-right:none; /* 통합 셀 — 구분선 제거 */
}
.tpl-class .licon-slot{width:64px;height:64px;border-radius:5px}
.tpl-class .licon-slot img{width:60px;height:60px}
.tpl-class .ltxt{text-align:center;font-size:11px}
.tpl-class .ritems{flex-direction:column;align-items:flex-start;gap:4px;padding:7px 10px}
.tpl-class .rit-tag-input{
  background:none;border:none;border-bottom:1px dashed var(--t3,#aaa);
  color:var(--acc,#c8a84b);font-size:10px;font-weight:700;outline:none;
  width:180px;padding:0;font-family:inherit;letter-spacing:.02em;cursor:text
}
.tpl-class .rit-icons{display:flex;flex-wrap:wrap;gap:4px}

/* ── 레이아웃: 요일별 (표1) ── */
.tpl-daily .ex-body{gap:2px;padding:4px}
.tpl-daily .trow.hdr-row{border-color:var(--acc,#c8a84b)}
.tpl-daily .trow.hdr-row .rlabel{
  background:var(--acc,#c8a84b);border-right-color:transparent;
  min-width:0;max-width:none;width:auto;flex:1;justify-content:center;
}
.tpl-daily .trow.hdr-row .licon-slot{display:none}
.tpl-daily .trow.hdr-row .ltxt{color:#fff;font-weight:700;font-size:12px;text-align:center;letter-spacing:.06em}
.tpl-daily .trow.hdr-row .ritems{display:none}
.tpl-daily .trow:not(.hdr-row) .rlabel{width:var(--rlw,82px);min-width:0;max-width:none}

/* ── 레이아웃: 티어표 (표3) ── */
.tpl-tier .ex-body{gap:0;padding:0}
.tpl-tier .trow{border-radius:0;border-left:none;border-right:none;border-top:none;border-bottom:2px solid var(--eb,#111);background:var(--rb,#1a1a1a)}
.tpl-tier .trow:last-child{border-bottom:none}
.tpl-tier .trow:first-child{border-top:none}
.tpl-tier .rlabel{
  width:var(--rlw,96px);min-width:0;max-width:none;
  background:var(--tierc,#ef9a9a);border-right:2px solid var(--eb,#111);
  align-items:center;justify-content:center;padding:6px;
}
.tpl-tier .licon-slot{display:none}
.tpl-tier .ltxt{color:#1a1a1a;font-weight:700;font-size:13px;text-align:center;height:auto;overflow:hidden;letter-spacing:.02em}
.tpl-tier .ritems{gap:2px;padding:2px 4px;min-height:60px}
.tpl-tier .ric{width:56px;height:56px;border-radius:0;border:none;background:transparent}
.tpl-tier .ric img{width:56px;height:56px;object-fit:cover}

/* ── 모달 ── */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:var(--s1);border:1px solid var(--line);border-radius:8px;width:360px;max-height:520px;display:flex;flex-direction:column;overflow:hidden}
.modal-top{padding:12px 14px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:8px}
.modal-top h3{flex:1;font-size:13px;font-weight:500;color:var(--t1)}
.modal-tabs{display:flex;border-bottom:1px solid var(--line)}
.mtab{flex:1;padding:7px 4px;font-size:11px;text-align:center;cursor:pointer;color:var(--t2);border:none;border-bottom:2px solid transparent;background:none;transition:.1s}
.mtab:hover{color:var(--t1)}
.mtab.active{color:var(--acc);border-bottom-color:var(--acc)}
.modal-srch{padding:8px;border-bottom:1px solid var(--line)}
.modal-srch input{width:100%;background:var(--s2);color:var(--t1);border:1px solid var(--line);border-radius:4px;padding:6px 9px;font-size:12px;outline:none}
.modal-pool{flex:1;overflow-y:auto;padding:8px;display:flex;flex-wrap:wrap;gap:5px;align-content:flex-start}
.modal-foot{padding:8px 12px;border-top:1px solid var(--line);font-size:10px;color:var(--t3);display:flex;align-items:center;justify-content:space-between}


/* ── 아이콘/텍스트 개별 X 버튼 ── */
.licon-wrap{position:relative;flex-shrink:0}
.licon-del{
  display:none;position:absolute;top:-5px;right:-5px;
  width:14px;height:14px;background:rgba(224,85,85,.9);border-radius:50%;
  align-items:center;justify-content:center;font-size:9px;color:#fff;
  cursor:pointer;z-index:15;line-height:1;
}
.rlabel:hover .licon-del{display:flex}
.ltxt-wrap{flex:1;min-width:0;position:relative}
.ltxt-wrap .ltxt{width:100%}
.ltxt-del{
  display:none;position:absolute;top:0;right:0;
  width:14px;height:14px;background:rgba(224,85,85,.9);border-radius:50%;
  align-items:center;justify-content:center;font-size:9px;color:#fff;
  cursor:pointer;z-index:15;line-height:1;
}
.rlabel:hover .ltxt-del{display:flex}
.rlabel.no-icon{justify-content:center}
.rlabel.no-text{justify-content:center}

/* ── 표2 소제목 X ── */
.rit-tag-wrap{position:relative;display:inline-flex;align-items:center}
.rit-tag-del{
  display:none;position:absolute;top:-5px;right:-5px;
  width:14px;height:14px;background:rgba(224,85,85,.9);border-radius:50%;
  align-items:center;justify-content:center;font-size:9px;color:#fff;
  cursor:pointer;z-index:15;line-height:1;
}
.ritems:hover .rit-tag-del{display:flex}

/* ── 테이블 너비 리사이즈 ── */
.ea-wrap{display:inline-flex;align-items:stretch}
.ea-rsz{
  width:6px;cursor:col-resize;user-select:none;
  border-radius:0 3px 3px 0;transition:background .12s;align-self:stretch;
}
.ea-rsz:hover,.ea-rsz.dragging{background:rgba(155,125,50,.35)}

/* 스피너 */
.spin{display:inline-block;width:13px;height:13px;border:2px solid var(--line);border-top-color:var(--acc);border-radius:50%;animation:sp .6s linear infinite;vertical-align:middle}
@keyframes sp{to{transform:rotate(360deg)}}

.statusbar{padding:4px 14px;background:var(--s1);border-top:1px solid var(--line);font-size:10px;color:var(--t3);flex-shrink:0}

/* ── 서번트 필터 ── */
#svtFilters{flex-direction:column;gap:3px;padding:5px 6px 4px;border-bottom:1px solid var(--line);flex-shrink:0}
.ftab-row{display:flex;flex-wrap:wrap;gap:2px}
.ftab{
  padding:2px 6px;font-size:10px;cursor:pointer;
  background:var(--s2);color:var(--t2);
  border:1px solid var(--line);border-radius:3px;
  white-space:nowrap;transition:background .1s,color .1s,border-color .1s;
}
.ftab:hover{background:var(--s3);color:var(--t1)}
.ftab.active{background:var(--acc);color:#fff;border-color:var(--acc)}
.ric-hover{border-color:var(--acc,#c8a84b)!important}

/* no-icon 시 글자 세로 중앙 */
.rlabel.no-icon .ltxt-wrap{align-self:stretch;display:flex;align-items:center}
.rlabel.no-icon .ltxt{height:auto;min-height:0}

/* 모바일 반응형 */
@media(max-width:768px){
  .topbar{padding:8px 10px}
  .wrap{flex-direction:column}
  .left{width:100%!important;height:auto;max-height:180px;border-right:none;border-bottom:1px solid var(--line);flex-shrink:0}
  .pool{flex-direction:row;flex-wrap:nowrap;overflow-x:auto;overflow-y:hidden;padding:6px;align-content:center;scrollbar-width:thin}
  .pi{min-width:56px;flex-shrink:0}
  .pi img{width:38px;height:38px}
  .right{flex:1;min-height:0;overflow:hidden}
  .toolbar{flex-wrap:nowrap;overflow-x:auto;overflow-y:hidden;padding:6px 10px;gap:5px;scrollbar-width:none}
  .toolbar::-webkit-scrollbar{display:none}
  .btn{padding:4px 9px;font-size:11px;white-space:nowrap;flex-shrink:0}
  .tbtitle{width:120px;font-size:11px;flex-shrink:0}
  .tb-sel{font-size:11px;flex-shrink:0}
  .cvs-scroll{padding:10px 8px}
  #exportArea{min-width:0;max-width:100%}
  .tpl-daily .trow:not(.hdr-row) .rlabel{width:var(--rlw,72px)}
  .modal{width:95vw;max-height:80vh}
  #bottomBar{font-size:10px;padding:3px 8px}
}
</style>
</head>
<body>

<div class="topbar">
  <h1>FGO <span>Table Maker</span></h1>
  <select class="tb-sel" id="gSrv" onchange="changeSrv()" style="margin-left:auto">
    <option value="KR">KR</option>
    <option value="JP">JP</option>
  </select>
</div>

<div class="wrap">
  <!-- ══ LEFT PANEL ══ -->
  <div class="left" id="leftPanel">
    <div class="left-rsz" id="leftRsz"></div>
    <div class="tabs">
      <button class="tab active" data-tab="mat" onclick="switchTab('mat')">재료</button>
      <button class="tab" data-tab="svt" onclick="switchTab('svt')">서번트</button>
      <button class="tab" data-tab="evt" onclick="switchTab('evt')">이벤트</button>
    </div>
    <div class="lp-search">
      <input type="text" id="lpSrch" placeholder="이름 검색…" oninput="filterPool()"/>
    </div>
    <div id="matFilters" class="ftab-row" style="display:flex;gap:2px;padding:5px 6px 4px;border-bottom:1px solid var(--line);flex-shrink:0">
      <button class="ftab active" data-bg="" onclick="setMatFilter('')">전체</button>
      <button class="ftab" data-bg="gold" onclick="setMatFilter('gold')">금테</button>
      <button class="ftab" data-bg="silver" onclick="setMatFilter('silver')">은테</button>
      <button class="ftab" data-bg="bronze" onclick="setMatFilter('bronze')">동테</button>
      <button class="ftab" data-bg="etc" onclick="setMatFilter('etc')">그외</button>
    </div>
    <div id="svtFilters" style="display:none">
      <div class="ftab-row" id="rarityFilters">
        <button class="ftab active" data-rarity="0" onclick="setRarityFilter(0)">전체</button>
        <button class="ftab" data-rarity="5" onclick="setRarityFilter(5)">★5</button>
        <button class="ftab" data-rarity="4" onclick="setRarityFilter(4)">★4</button>
        <button class="ftab" data-rarity="3" onclick="setRarityFilter(3)">★3</button>
        <button class="ftab" data-rarity="2" onclick="setRarityFilter(2)">★2</button>
        <button class="ftab" data-rarity="1" onclick="setRarityFilter(1)">★1</button>
      </div>
      <div class="ftab-row" id="classFilters">
        <button class="ftab active" data-class="" onclick="setClassFilter('')">전체</button>
        <button class="ftab" data-class="saber" onclick="setClassFilter('saber')">세이버</button>
        <button class="ftab" data-class="archer" onclick="setClassFilter('archer')">아처</button>
        <button class="ftab" data-class="lancer" onclick="setClassFilter('lancer')">랜서</button>
        <button class="ftab" data-class="rider" onclick="setClassFilter('rider')">라이더</button>
        <button class="ftab" data-class="caster" onclick="setClassFilter('caster')">캐스터</button>
        <button class="ftab" data-class="assassin" onclick="setClassFilter('assassin')">어쌔씬</button>
        <button class="ftab" data-class="berserker" onclick="setClassFilter('berserker')">버서커</button>
        <button class="ftab" data-class="ruler" onclick="setClassFilter('ruler')">룰러</button>
        <button class="ftab" data-class="avenger" onclick="setClassFilter('avenger')">어벤져</button>
        <button class="ftab" data-class="moonCancer" onclick="setClassFilter('moonCancer')">문캔서</button>
        <button class="ftab" data-class="alterEgo" onclick="setClassFilter('alterEgo')">얼터에고</button>
        <button class="ftab" data-class="foreigner" onclick="setClassFilter('foreigner')">포리너</button>
        <button class="ftab" data-class="pretender" onclick="setClassFilter('pretender')">프리텐더</button>
      </div>
    </div>
    <div class="pool" id="pool"><div style="padding:12px;color:var(--t2);font-size:11px"><span class="spin"></span> 로딩 중…</div></div>
    <div class="lp-foot" id="lpFoot">—</div>
  </div>

  <!-- ══ RIGHT PANEL ══ -->
  <div class="right">
    <div class="toolbar">
      <input class="tbtitle" type="text" id="tableTitle" value="테이블" oninput="syncTitle()"/>
      <div class="sep"></div>
      <select class="tb-sel" id="theme" onchange="applyTheme()">
        <option value="th-light">라이트</option>
        <option value="th-warm">웜</option>
        <option value="th-cool">쿨</option>
        <option value="th-dark">다크</option>
      </select>
      <div class="sep"></div>
      <select class="tb-sel" id="layout" onchange="applyLayout()">
        <option value="daily">드롭테이블1</option>
        <option value="class">드롭테이블2</option>
        <option value="tier">표3 (티어표)</option>
      </select>
      <button class="btn" onclick="addRow()">+ 행 추가</button>
      <button class="btn" id="btnHdr" onclick="addHeaderRow()" style="display:none">+ 헤더</button>
      <button class="btn" onclick="clearAll()" style="margin-left:auto;color:var(--t3)">초기화</button>
      <button class="btn save" onclick="exportPNG()">PNG 저장</button>
    </div>

    <div class="cvs-scroll">
      <div class="ea-wrap">
      <div id="exportArea" class="th-light">
        <div class="ex-hdr"><span class="ex-ttl" id="exTtl">테이블</span></div>
        <div class="ex-body" id="exBody">
          <div style="padding:40px;text-align:center;color:#888;font-size:12px">
            [+ 행 추가] 후 왼쪽에서 아이콘 클릭
          </div>
        </div>
      </div>
      <div class="ea-rsz" id="eaRsz" data-nex></div>
      </div>
      <div id="eaResizer"></div>
    </div>
    <div class="statusbar" id="sb">준비</div>
  </div>
</div>

<!-- ══ ICON PICKER MODAL ══ -->
<div class="modal-bg" id="iconModal" onclick="closeModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-top">
      <h3>레이블 아이콘 선택</h3>
      <button class="btn" onclick="closeModal()" style="padding:3px 8px;font-size:11px">닫기</button>
    </div>
    <div class="modal-tabs">
      <button class="mtab active" data-mtab="mat" onclick="switchMtab('mat')">재료</button>
      <button class="mtab" data-mtab="svt" onclick="switchMtab('svt')">서번트</button>
      <button class="mtab" data-mtab="evt" onclick="switchMtab('evt')">이벤트</button>
    </div>
    <div class="modal-srch"><input type="text" id="mSrch" placeholder="검색…" oninput="filterModal()"/></div>
    <div class="modal-pool" id="mPool"></div>
    <div class="modal-foot">
      <span id="mFoot">클릭하면 행 레이블 아이콘으로 설정</span>
      <button class="btn" onclick="clearLabelIcon()" style="padding:3px 8px;font-size:11px;color:#da3633">아이콘 제거</button>
    </div>
  </div>
</div>

<script>
/* ══ STATE ══ */
let server = 'KR';
let data = { mat:[], svt:[], evt:[] };
let loaded = {};
let loading = {};
let curTab = 'mat';
let curMtab = 'mat';

let rows = [];
const TIER_COLORS = ['#ef9a9a','#efb78c','#eed28a','#e3e49a','#bcdfa4','#9eddbf','#9ccfdf','#a6bce8','#bdaae3','#e3a2cb','#d4b29a'];
let activeRowId = null;
let rowCnt = 0;
let modalTargetRowId = null;
let curLayout = 'daily'; // 'daily' | 'class'
let svtRarityFilter = new Set(); // 빈 Set=전체 (다중선택)
let svtClassFilter = new Set();  // 빈 Set=전체 (다중선택)
let matBgFilter = new Set();     // 빈 Set=전체 (금테/은테/동테/그외)

/* ══ INIT ══ */
window.onload = () => setTimeout(() => { switchTab('mat'); applyLayout(); initResize(); }, 300);

/* ══ SERVER ══ */
function changeSrv() {
  server = document.getElementById('gSrv').value;
  data = { mat:[], svt:[], evt:[] };
  loaded = {};
  loading = {};
  loadTab(curTab);
}

/* ══ TAB SWITCH ══ */
function switchTab(tab) {
  curTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  document.getElementById('lpSrch').value = '';
  document.getElementById('svtFilters').style.display = (tab === 'svt') ? 'flex' : 'none';
  document.getElementById('matFilters').style.display = (tab === 'mat') ? 'flex' : 'none';
  if (!loaded[tab]) loadTab(tab);
  else if (tab === 'svt') applySvtFilter();
  else renderPool(data[tab]);
}

function switchMtab(tab) {
  curMtab = tab;
  document.querySelectorAll('.mtab').forEach(t => t.classList.toggle('active', t.dataset.mtab === tab));
  document.getElementById('mSrch').value = '';
  if (!loaded[tab]) loadTab(tab).then(() => renderModal(data[tab]));
  else renderModal(data[tab]);
}

/* ══ LOAD DATA ══ */
async function loadTab(tab) {
  if (loaded[tab]) { renderPool(data[tab]); return; }
  if (loading[tab]) return;
  loading[tab] = true;
  setPool('<div style="padding:12px;color:var(--t2);font-size:11px"><span class="spin"></span> 로딩 중…</div>');
  setFoot('로딩 중…');
  try {
    if (tab === 'mat' || tab === 'evt') {
      if (!loaded._items) await loadAllItems();
    }
    if (tab === 'svt') await loadServants();
    loaded[tab] = true;
    loading[tab] = false;
    if (tab === 'svt') applySvtFilter();
    else { renderPool(data[tab]); setFoot(`${data[tab].length}개`); }
  } catch(e) {
    loading[tab] = false;
    setPool(`<div style="padding:12px;color:#c0392b;font-size:11px">오류: ${e.message} <button onclick="loading['${tab}']=false;loadTab('${tab}')" style="margin-left:6px;padding:2px 6px;font-size:11px;cursor:pointer">재시도</button></div>`);
    setFoot('실패');
  }
}

async function fetchWithTimeout(url, ms=15000) {
  const ctrl = new AbortController();
  const tid = setTimeout(() => ctrl.abort(), ms);
  try {
    const r = await fetch(url, { signal: ctrl.signal });
    const data = await r.json();
    clearTimeout(tid);
    return data;
  } catch(e) {
    clearTimeout(tid);
    throw e;
  }
}

async function loadAllItems() {
  let items = null;
  for (let attempt = 0; attempt < 3; attempt++) {
    try {
      items = await fetchWithTimeout(
        `https://api.atlasacademy.io/export/${server}/nice_item.json`, 8000
      );
      break;
    } catch(e) {
      if (attempt === 2) throw new Error(`아이템 로드 실패 (${e.message})`);
    }
  }
  if (!items) throw new Error('아이템 목록 로드 실패');

  const evtTypes = new Set(['eventItem','tdAndEventPoint','eventRewardSet','eventPoint']);

  data.mat = []; data.evt = [];

  const HIDDEN_IDS = new Set([
    301, 6008, 6108, 6208, 6504, 7008, 7108,
    5, 6, 7, 11, 17, 18, 46, 48, 49, 103, 104, 300, 1000, 2000, 4001,
    5000, 5001, 5002, 5003, 80059,
    94012301, 94012303, 94013001, 94013002, 94013006, 94013007, 94013008,
    94013706, 94015308, 94016904, 94016905, 94016906, 94016907, 94016908,
    94025404, 94025405, 94025406, 94025804, 94025805, 94025806,
    94043007, 94054207, 94054401, 94060301, 94064307, 94065901,
    94071701, 94073101, 94075008, 94076901, 94079401, 94080009,
    94083401, 94083402, 94087501, 94088401, 94088501, 94088701,
    94089602, 94090701, 94090702, 94091001, 94092202,
    94093201, 94093202, 94093306, 94094701, 94095301,
    94098501, 94100101, 94100301, 94136001, 94137702, 94137703, 94138201,
    694060301, 694060302,
  ]);
  const HIDDEN_TYPES = new Set(['itemSelect', 'svtCoin']);

  const ETC_FORCE = new Set([2, 3, 6, 7, 11, 16, 50, 51, 52, 53, 100, 101, 102, 104, 6999, 7998, 7999]); // 전승결정·토치·과일·성정석/편·마나·성배 → '그외'
  for (const it of items) {
    if (!it.id || !it.name) continue;
    if (HIDDEN_IDS.has(it.id)) continue;
    if (HIDDEN_TYPES.has(it.type)) continue;
    const icon = (it.icon && it.icon.startsWith('http'))
      ? it.icon
      : `https://static.atlasacademy.io/${server}/Items/${it.id}.png`;
    const obj = { id: it.id, name: it.name, icon, isSvt: false, itemType: it.type, priority: it.priority || 0, bg: ETC_FORCE.has(it.id) ? 'etc' : (it.background || '') };
    const t = it.type || '';
    if (evtTypes.has(t))       data.evt.push(obj);
    else if (it.id >= 94000000) data.evt.push(obj);
    else                        data.mat.push(obj);
  }

  // ── 재료 정렬 ──
  // skillLvUp 커스텀 순서 59개 → 피스 → 모뉴먼트 → 나머지
  const SKILL_ORDER = [
    6503,6516,6512,6505,6522,6527,6530,6533,6534,6549,6551,6552,6554,6555,
    6502,6508,6515,6509,6501,6510,6511,6514,6513,6524,6526,6532,6535,6537,
    6536,6538,6541,6543,6545,6547,6550,6553,6556,6557,6559,
    6507,6517,6506,6518,6519,6520,6521,6523,6525,6528,6529,6531,
    6539,6540,6542,6544,6546,6548,6558,6560,
  ];
  const SKILL_MAP = new Map(SKILL_ORDER.map((id,i) => [id, i]));

  function matKey(it) {
    const t = it.itemType, id = it.id, p = it.priority;
    // skillLvUp 커스텀 순서
    if (t === 'skillLvUp' && id >= 6500 && id < 6999) {
      const idx = SKILL_MAP.has(id) ? SKILL_MAP.get(id) : 999;
      return [0, 0, idx];
    }
    // 피스 (tdLvUp, id < 7100)
    if (t === 'tdLvUp' && id >= 7001 && id < 7100) return [0, 1, p];
    // 모뉴먼트 (tdLvUp, id >= 7100)
    if (t === 'tdLvUp' && id >= 7100 && id <= 7107) return [0, 2, p];
    // 전승결정
    if (id === 6999) return [1, 0, 0];
    // 휘석�마석�비석
    if (t === 'skillLvUp' && id >= 6001 && id <= 6007) return [2, 0, id];
    if (t === 'skillLvUp' && id >= 6101 && id <= 6107) return [3, 0, id];
    if (t === 'skillLvUp' && id >= 6201 && id <= 6207) return [4, 0, id];
    // 별빛의모래�토치
    if (id >= 50 && id <= 53) return [5, 0, id];
    // 사과
    if (t === 'apRecover' || t === 'apAdd') return [6, 0, p];
    // QP
    if (t === 'qp') return [7, 0, 0];
    // 성정석
    if (t === 'stone' || t === 'chargeStone' || t === 'netmarbleChargeStone') return [8, 0, 0];
    // 마나프리즘
    if (t === 'mana') return [9, 0, 0];
    // 성정편
    if (t === 'stoneFragments') return [10, 0, 0];
    // 프렌즈포인트
    if (t === 'friendPoint') return [11, 0, 0];
    // 성배의물방울�성배
    if (id === 7998) return [12, 0, 0];
    if (id === 7999) return [13, 0, 0];
    return [99, 0, p];
  }
  data.mat.sort((a,b) => {
    const ka = matKey(a), kb = matKey(b);
    for (let i = 0; i < ka.length; i++) if (ka[i] !== kb[i]) return ka[i] - kb[i];
    return 0;
  });

  // ── 이벤트 정렬 ──
  const PERM_NAMES = ['사쿠라 칩','사쿠라 머니','키아라 퍼니셔','BB$','드림 칩'];
  data.evt.sort((a,b) => {
    const pa = PERM_NAMES.some(k=>a.name.includes(k)) ? 1 : 0;
    const pb = PERM_NAMES.some(k=>b.name.includes(k)) ? 1 : 0;
    if (pa!==pb) return pa-pb;
    const ra = a.priority||a.id, rb = b.priority||b.id;
    const ga = Math.floor(ra/1000), gb = Math.floor(rb/1000);
    if (ga!==gb) return gb-ga;
    return ra-rb;
  });

  loaded._items = true;
}

async function loadServants() {
  const candidates = server === 'JP'
    ? ['basic_svt_lang_en.json', 'basic_svt.json']
    : ['basic_svt.json'];
  let svts = null;
  for (const fname of candidates) {
    try {
      svts = await fetchWithTimeout(
        `https://api.atlasacademy.io/export/${server}/${fname}`, 12000
      );
      if (svts) break;
    } catch {}
  }
  if (!svts) throw new Error('svt 로드 실패');
  data.svt = svts
    .filter(s => s.collectionNo > 0 && s.type !== 'servantEquip')
    .sort((a,b) => a.collectionNo - b.collectionNo)
    .map(s => ({
      id: s.id,
      name: s.name || `No.${s.collectionNo}`,
      icon: s.face || `https://static.atlasacademy.io/${server}/Faces/f_${s.id}.png`,
      isSvt: true,
      rarity: s.rarity || 0,
      svtClass: s.className || '',
    }));
}

/* ══ RENDER POOL ══ */
function renderPool(items, parentId='pool', onClick=null) {
  const el = document.getElementById(parentId);
  if (!items || !items.length) { el.innerHTML='<div style="padding:10px;color:var(--t3);font-size:11px">항목 없음</div>'; return; }
  el.innerHTML = items.slice(0,200).map(it => {
    const cls = it.isSvt ? 'pi svt' : 'pi';
    const fn = onClick ? `${onClick}(${it.id})` : `clickItem(${it.id})`;
    return `<div class="${cls}" onclick="${fn}" title="${it.name}">
      <img src="${it.icon}" onerror="this.closest('.pi').remove()" crossorigin="anonymous"/>
      <span class="pn">${it.name}</span>
    </div>`;
  }).join('');
}

function renderModal(items) {
  const el = document.getElementById('mPool');
  if (!items || !items.length) { el.innerHTML='<div style="padding:10px;color:var(--t3);font-size:11px">항목 없음</div>'; return; }
  el.innerHTML = items.slice(0,200).map(it => {
    const cls = it.isSvt ? 'pi svt' : 'pi';
    return `<div class="${cls}" onclick="pickLabelIcon(${it.id})" title="${it.name}">
      <img src="${it.icon}" onerror="this.closest('.pi').remove()" crossorigin="anonymous"/>
      <span class="pn">${it.name}</span>
    </div>`;
  }).join('');
}

/* ══ FILTER ══ */
function filterPool() {
  if (curTab === 'svt') { applySvtFilter(); return; }
  const q = document.getElementById('lpSrch').value.toLowerCase();
  let items = data[curTab] || [];
  if (curTab === 'mat' && matBgFilter.size) {
    items = items.filter(it => {
      const std = ['gold','silver','bronze'].includes(it.bg);
      return matBgFilter.has(it.bg) || (matBgFilter.has('etc') && !std);
    });
  }
  const filtered = q ? items.filter(it => it.name.toLowerCase().includes(q)) : items;
  renderPool(filtered.slice(0,200));
  setFoot(`${filtered.length}개${q ? ` (검색: ${q})` : ''}`);
}

function filterModal() {
  const q = document.getElementById('mSrch').value.toLowerCase();
  const items = data[curMtab] || [];
  const filtered = q ? items.filter(it => it.name.toLowerCase().includes(q)) : items;
  renderModal(filtered.slice(0,200));
}

/* ══ CLICK ITEM → ADD TO ROW ══ */
function clickItem(itemId) {
  const item = findItem(itemId);
  if (!item) return;
  if (!activeRowId) { addRow(); setTimeout(() => clickItem(itemId), 60); return; }
  const row = rows.find(r => r.id === activeRowId);
  if (!row) return;
  row.items.push({...item});
  rerender();
  setSb(`"${item.name}" → ${row.label}`);
}

function findItem(id) {
  for (const list of Object.values(data)) {
    const found = list.find(it => it.id === id);
    if (found) return found;
  }
  return null;
}

/* ══ ROW MANAGEMENT ══ */
function addRow() {
  const id = ++rowCnt;
  rows.push({ id, label: `행 ${id}`, labelIcon: null, items: [], isHeader: false, tag: '', hideLicon: false, hideLabel: false, hideTag: false, color: TIER_COLORS[rows.length % TIER_COLORS.length] });
  activeRowId = id;
  rerender();
  setTimeout(() => {
    const el = document.getElementById(`ltxt-${id}`);
    if (el) { el.focus(); el.select(); }
  }, 40);
}

function addHeaderRow() {
  const id = ++rowCnt;
  rows.push({ id, label: '', labelIcon: null, items: [], isHeader: true, tag: '', hideLicon: false, hideLabel: false, hideTag: false });
  activeRowId = id;
  rerender();
  setTimeout(() => {
    const el = document.getElementById(`ltxt-${id}`);
    if (el) { el.focus(); }
  }, 40);
}

function updateTag(id, v) {
  const r = rows.find(r => r.id === id);
  if (r) r.tag = v;
}

function applyLayout() {
  curLayout = document.getElementById('layout').value;
  const ea = document.getElementById('exportArea');
  ea.classList.remove('tpl-class', 'tpl-daily', 'tpl-tier');
  if (curLayout === 'class') ea.classList.add('tpl-class');
  else if (curLayout === 'tier') ea.classList.add('tpl-tier');
  else ea.classList.add('tpl-daily');
  // 레이아웃 전환 시 --rlw 초기화 (각 레이아웃 CSS 기본값으로 복귀)
  ea.style.removeProperty('--rlw');
  document.getElementById('btnHdr').style.display = (curLayout === 'daily') ? '' : 'none';
  // 표3 첫 진입 시 예시 행 (세이버 + 청밥)
  if (curLayout === 'tier' && !rows.length) {
    const id = ++rowCnt;
    rows.push({ id, label: '세이버', labelIcon: null,
      items: [{ name: '알트리아 펜드래곤', icon: 'https://static.atlasacademy.io/KR/Faces/f_1001000.png', isSvt: true }],
      isHeader: false, tag: '', hideLicon: false, hideLabel: false, hideTag: false, color: TIER_COLORS[0] });
    activeRowId = id;
  }
  rerender();
}

function removeRow(id) {
  rows = rows.filter(r => r.id !== id);
  if (activeRowId === id) activeRowId = rows.length ? rows[rows.length-1].id : null;
  rerender();
}

function moveRow(id, dir) {
  const i = rows.findIndex(r => r.id === id);
  const t = i + dir;
  if (t < 0 || t >= rows.length) return;
  [rows[i], rows[t]] = [rows[t], rows[i]];
  rerender();
}

function setActive(id) { activeRowId = id; rerender(); }

function cycleColor(id) {
  const r = rows.find(r => r.id === id);
  if (!r) return;
  const i = TIER_COLORS.indexOf(r.color || TIER_COLORS[0]);
  r.color = TIER_COLORS[(i + 1) % TIER_COLORS.length];
  rerender();
}

function updateLabel(id, v) {
  const r = rows.find(r => r.id === id);
  if (r) r.label = v;
}

function removeItem(rowId, idx) {
  const r = rows.find(r => r.id === rowId);
  if (r) r.items.splice(idx, 1);
  rerender();
}

/* ══ LABEL ICON MODAL ══ */
function openIconModal(rowId) {
  modalTargetRowId = rowId;
  curMtab = curTab;
  document.querySelectorAll('.mtab').forEach(t => t.classList.toggle('active', t.dataset.mtab === curMtab));
  document.getElementById('mSrch').value = '';
  document.getElementById('iconModal').classList.add('open');
  renderModal((data[curMtab] || []).slice(0,200));
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('iconModal')) return;
  document.getElementById('iconModal').classList.remove('open');
  modalTargetRowId = null;
}
document.getElementById('iconModal').addEventListener('click', function(e){
  if (e.target === this) { this.classList.remove('open'); modalTargetRowId=null; }
});

function pickLabelIcon(itemId) {
  const item = findItem(itemId);
  if (!item || !modalTargetRowId) return;
  const row = rows.find(r => r.id === modalTargetRowId);
  if (row) { row.labelIcon = {...item}; rerender(); }
  document.getElementById('iconModal').classList.remove('open');
  modalTargetRowId = null;
}

function clearLabelIcon() {
  if (!modalTargetRowId) return;
  const row = rows.find(r => r.id === modalTargetRowId);
  if (row) { row.labelIcon = null; rerender(); }
  document.getElementById('iconModal').classList.remove('open');
  modalTargetRowId = null;
}

/* ══ DRAG REORDER items within row ══ */
let dragSrc = null;
function dStart(e, rowId, idx) { dragSrc = {rowId, idx}; e.dataTransfer.effectAllowed='move'; }
function dOver(e, rowId, idx) {
  e.preventDefault(); e.stopPropagation();
  if (!dragSrc || dragSrc.rowId !== rowId) return;
  e.currentTarget.classList.add('ric-hover');
}
function dLeave(e) { e.currentTarget.classList.remove('ric-hover'); }
function dDrop(e, rowId, idx) {
  e.preventDefault(); e.stopPropagation();
  e.currentTarget.classList.remove('ric-hover');
  if (!dragSrc || dragSrc.rowId !== rowId || dragSrc.idx === idx) return;
  const row = rows.find(r => r.id === rowId);
  if (!row) return;
  const [item] = row.items.splice(dragSrc.idx, 1);
  row.items.splice(idx, 0, item);
  dragSrc = null; rerender();
}
// 아이템 영역 빈 공간에 드롭 → 맨 뒤로 이동
function dOverEnd(e, rowId) {
  e.preventDefault();
  if (!dragSrc || dragSrc.rowId !== rowId) return;
  e.currentTarget.style.outline = '1px dashed var(--acc)';
}
function dLeaveEnd(e) { e.currentTarget.style.outline = ''; }
function dDropEnd(e, rowId) {
  e.preventDefault();
  e.currentTarget.style.outline = '';
  if (!dragSrc || dragSrc.rowId !== rowId) return;
  const row = rows.find(r => r.id === rowId);
  if (!row) return;
  if (dragSrc.idx === row.items.length - 1) { dragSrc = null; return; }
  const [item] = row.items.splice(dragSrc.idx, 1);
  row.items.push(item);
  dragSrc = null; rerender();
}

/* ══ TOGGLE LABEL/ICON ══ */
function toggleLicon(rowId) {
  const r = rows.find(r => r.id === rowId);
  if (r) { r.hideLicon = !r.hideLicon; rerender(); }
}
function toggleLabel(rowId) {
  const r = rows.find(r => r.id === rowId);
  if (r) { r.hideLabel = !r.hideLabel; rerender(); }
}
function toggleTag(rowId) {
  const r = rows.find(r => r.id === rowId);
  if (r) { r.hideTag = !r.hideTag; rerender(); }
}

/* ══ SVT FILTER (다중선택 토글, 빈 Set=전체) ══ */
function toggleSetFilter(set, val) {
  // val이 falsy(전체) → 전부 해제
  if (val === 0 || val === '') { set.clear(); return; }
  if (set.has(val)) set.delete(val); else set.add(val);
}
function syncFtabs(sel, set, key, isNum) {
  document.querySelectorAll(sel).forEach(b => {
    const v = isNum ? +b.dataset[key] : b.dataset[key];
    const isAll = isNum ? v === 0 : v === '';
    b.classList.toggle('active', isAll ? set.size === 0 : set.has(v));
  });
}
function setRarityFilter(r) {
  toggleSetFilter(svtRarityFilter, r);
  syncFtabs('#rarityFilters .ftab', svtRarityFilter, 'rarity', true);
  applySvtFilter();
}
function setClassFilter(c) {
  toggleSetFilter(svtClassFilter, c);
  syncFtabs('#classFilters .ftab', svtClassFilter, 'class', false);
  applySvtFilter();
}
function setMatFilter(bg) {
  toggleSetFilter(matBgFilter, bg);
  syncFtabs('#matFilters .ftab', matBgFilter, 'bg', false);
  filterPool();
}
function applySvtFilter() {
  const q = document.getElementById('lpSrch').value.toLowerCase();
  let items = data.svt || [];
  if (svtRarityFilter.size) items = items.filter(s => svtRarityFilter.has(s.rarity));
  if (svtClassFilter.size) items = items.filter(s => svtClassFilter.has(s.svtClass));
  if (q) items = items.filter(it => it.name.toLowerCase().includes(q));
  renderPool(items.slice(0,500), 'pool');
  setFoot(`${items.length}개${q ? ` (검색: ${q})` : ''}`);
}

/* ══ RESIZE ══ */
function makeDragger(onMove, onEnd) {
  const mm = e2 => onMove(e2);
  const mu = e2 => { document.removeEventListener('mousemove', mm); document.removeEventListener('mouseup', mu); if (onEnd) onEnd(); };
  document.addEventListener('mousemove', mm);
  document.addEventListener('mouseup', mu);
}

// rlabel 너비 드래그
function rszLabel(e) {
  e.preventDefault(); e.stopPropagation();
  const ea = document.getElementById('exportArea');
  const firstRl = ea.querySelector('.rlabel:not(.hdr-row .rlabel)');
  const startW = firstRl ? firstRl.offsetWidth : 96;
  const startX = e.clientX;
  e.currentTarget.classList.add('dragging');
  const handle = e.currentTarget;
  makeDragger(
    e2 => {
      const w = Math.max(36, Math.min(320, startW + e2.clientX - startX));
      ea.style.setProperty('--rlw', w + 'px');
    },
    () => handle.classList.remove('dragging')
  );
}

function initResize() {
  // ── 좌측 패널 너비 ──
  const leftEl = document.getElementById('leftPanel');
  const leftRsz = document.getElementById('leftRsz');
  leftRsz.addEventListener('mousedown', e => {
    e.preventDefault();
    const startX = e.clientX, startW = leftEl.offsetWidth;
    leftRsz.classList.add('dragging');
    makeDragger(
      e2 => { leftEl.style.width = Math.max(140, Math.min(520, startW + e2.clientX - startX)) + 'px'; },
      () => leftRsz.classList.remove('dragging')
    );
  });

  // ── 테이블 너비 ──
  const eaRszEl = document.getElementById('eaRsz');
  if (eaRszEl) eaRszEl.addEventListener('mousedown', e => {
    e.preventDefault();
    const ea = document.getElementById('exportArea');
    const startX = e.clientX, startW = ea.offsetWidth;
    eaRszEl.classList.add('dragging');
    makeDragger(
      e2 => { ea.style.width = Math.max(200, startW + e2.clientX - startX) + 'px'; },
      () => eaRszEl.classList.remove('dragging')
    );
  });

    // ── 익스포트 영역 높이 ──
  const eaRsz = document.getElementById('eaResizer');
  eaRsz.addEventListener('mousedown', e => {
    e.preventDefault();
    const ea = document.getElementById('exportArea');
    const startY = e.clientY, startH = ea.offsetHeight;
    eaRsz.classList.add('dragging');
    makeDragger(
      e2 => {
        const h = Math.max(60, startH + e2.clientY - startY);
        ea.style.minHeight = h + 'px';
      },
      () => eaRsz.classList.remove('dragging')
    );
  });
}

/* ══ RENDER TABLE ══ */
function rerender() {
  const body = document.getElementById('exBody');
  if (!rows.length) {
    body.innerHTML='<div style="padding:40px;text-align:center;color:#888;font-size:12px">[+ 행 추가] 후 왼쪽에서 아이콘 클릭</div>';
    return;
  }

  const rlCls = row => {
    let c = 'rlabel';
    if (row.hideLicon) c += ' no-icon';
    if (row.hideLabel) c += ' no-text';
    return c;
  };

    const mkCtrl = id => `<div class="rctrl" data-nex>
    <button class="rc" onclick="moveRow(${id},-1);event.stopPropagation()">↑</button>
    <button class="rc" onclick="moveRow(${id},+1);event.stopPropagation()">↓</button>
    ${curLayout==='tier'?`<button class="rc" onclick="cycleColor(${id});event.stopPropagation()" title="색 변경">◑</button>`:''}
    <button class="rc dl" onclick="removeRow(${id});event.stopPropagation()">✕</button>
  </div>`;

  // rlabel 리사이즈 핸들 (PNG 제외용 data-nex)
  const rlRsz = `<div class="rl-rsz" data-nex onmousedown="rszLabel(event);event.stopPropagation()"></div>`;

  const mkIconSlot = row => {
  const iconStyle = row.hideLicon ? 'display:none' : '';
  const inner = row.labelIcon
    ? `<img src="${row.labelIcon.icon}" onerror="this.style.opacity='.3'" crossorigin="anonymous"/>
         <span class="ldel" onclick="clearLicon(${row.id});event.stopPropagation()">✕</span>`
    : '+';
  const slotCls = `licon-slot ${row.labelIcon?.isSvt?'svt':''}`;
  return `<div class="licon-wrap">
    <div class="${slotCls}" style="${iconStyle}" onclick="openIconModal(${row.id});event.stopPropagation()" title="아이콘">${inner}</div>
    <span class="licon-del" onclick="toggleLicon(${row.id});event.stopPropagation()" title="${row.hideLicon?'아이콘 표시':'아이콘 숨김'}">✕</span>
  </div>`;
};

  const mkRics = (row) => row.items.map((it,idx) =>
    `<div class="ric ${it.isSvt?'svt':''}"
      draggable="true"
      ondragstart="dStart(event,${row.id},${idx})"
      ondragover="dOver(event,${row.id},${idx})"
      ondragleave="dLeave(event)"
      ondrop="dDrop(event,${row.id},${idx})"
      title="${it.name}">
      <img src="${it.icon}" onerror="this.style.opacity='.2'" crossorigin="anonymous"/>
      <div class="rdel" onclick="removeItem(${row.id},${idx});event.stopPropagation()">✕</div>
    </div>`
  ).join('');

  let h = '';
  for (const row of rows) {
    const isSel = row.id === activeRowId;
    const ctrl = mkCtrl(row.id);
    const iconSlot = mkIconSlot(row);
    const ricsH = row.items.length ? mkRics(row) : `<span class="empty-hint">← 클릭해서 추가</span>`;

    /* ── 헤더 행 (표1 구분자) ── */
    if (row.isHeader) {
      h += `<div class="trow hdr-row ${isSel?'sel':''}" onclick="setActive(${row.id})">
        ${ctrl}
        <div class="rlabel">
          <textarea id="ltxt-${row.id}" class="ltxt" rows="1"
            oninput="updateLabel(${row.id},this.value)"
            onclick="event.stopPropagation()">${row.label}</textarea>
        </div>
        <div class="ritems"></div>
      </div>`;
      continue;
    }

    /* ── 표2 (클래스별) ── */
    if (curLayout === 'class') {
      h += `<div class="trow ${isSel?'sel':''}" onclick="setActive(${row.id})">
        ${ctrl}
        <div class="${rlCls(row)}">
          ${iconSlot}
          <textarea id="ltxt-${row.id}" class="ltxt" rows="2"
            oninput="updateLabel(${row.id},this.value)"
            onclick="event.stopPropagation()">${row.label}</textarea>
          ${rlRsz}
        </div>
        <div class="ritems">
          <input class="rit-tag-input" placeholder="소제목" value="${row.tag||''}"
            oninput="updateTag(${row.id},this.value)"
            onclick="event.stopPropagation()"/>
          <div class="rit-icons">${ricsH}</div>
        </div>
      </div>`;
    } else if (curLayout === 'tier') {
      /* ── 표3 (티어표) ── */
      h += `<div class="trow ${isSel?'sel':''}" onclick="setActive(${row.id})" style="--tierc:${row.color||'#ef9a9a'}">
        ${ctrl}
        <div class="rlabel" style="background:${row.color||'#ef9a9a'}">
          <textarea id="ltxt-${row.id}" class="ltxt" rows="1"
            oninput="updateLabel(${row.id},this.value)"
            onclick="event.stopPropagation()">${row.label}</textarea>
          ${rlRsz}
        </div>
        <div class="ritems">${ricsH}</div>
      </div>`;
    } else {
      /* ── 표1 (요일별) 일반 행 ── */
      h += `<div class="trow ${isSel?'sel':''}" onclick="setActive(${row.id})">
        ${ctrl}
        <div class="${rlCls(row)}">
          ${iconSlot}
          <textarea id="ltxt-${row.id}" class="ltxt" rows="2"
            oninput="updateLabel(${row.id},this.value)"
            onclick="event.stopPropagation()">${row.label}</textarea>
          ${rlRsz}
        </div>
        <div class="ritems">${ricsH}</div>
      </div>`;
    }
  }
  body.innerHTML = h;
}

function clearLicon(rowId) {
  const r = rows.find(r => r.id === rowId);
  if (r) { r.labelIcon = null; rerender(); }
}

/* ══ MISC ══ */
function syncTitle() { document.getElementById('exTtl').textContent = document.getElementById('tableTitle').value || '테이블'; }
function applyTheme() {
  const ea = document.getElementById('exportArea');
  const curRlw = ea.style.getPropertyValue('--rlw');
  const curMh = ea.style.minHeight;
  const curW = ea.style.width;
  ea.className = document.getElementById('theme').value;
  // 테마 변경 후 CSS var/minHeight 복원
  if (curRlw) ea.style.setProperty('--rlw', curRlw);
  if (curMh) ea.style.minHeight = curMh;
  if (curW) ea.style.width = curW;
  applyLayout();
}
function clearAll() { if (rows.length && confirm('전체 삭제?')) { rows=[]; activeRowId=null; rerender(); } }
function setPool(h) { document.getElementById('pool').innerHTML = h; }
function setFoot(t) { document.getElementById('lpFoot').textContent = t; }
function setSb(t) { document.getElementById('sb').textContent = t; }

/* ══ PNG EXPORT ══ */
async function exportPNG() {
  const area = document.getElementById('exportArea');
  setSb('PNG 생성 중…');

  const nexEls = area.querySelectorAll('[data-nex]');
  nexEls.forEach(el => el.style.display='none');
  const selEl = area.querySelector('.sel');
  if (selEl) selEl.classList.remove('sel');

  try {
    const imgs = area.querySelectorAll('img');
    await Promise.allSettled([...imgs].map(async img => {
      if (!img.src || img.src.startsWith('data:')) return;
      try {
        const r = await fetch(img.src, {mode:'cors'});
        const blob = await r.blob();
        img.src = await new Promise((res,rej) => {
          const fr = new FileReader();
          fr.onload = ()=>res(fr.result); fr.onerror=rej;
          fr.readAsDataURL(blob);
        });
      } catch {}
    }));

    const canvas = await html2canvas(area, { backgroundColor:null, scale:2, useCORS:true, allowTaint:false, logging:false });
    const link = document.createElement('a');
    const fname = (document.getElementById('tableTitle').value||'드롭_테이블').replace(/[^\w가-힣\s]/g,'').trim().replace(/\s+/g,'_')||'fgo_table';
    link.download = fname+'.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
    setSb('PNG 저장 완료 ✓');
  } catch(e) { setSb('오류: '+e.message); }
  finally {
    nexEls.forEach(el => el.style.display='');
    if (selEl) selEl.classList.add('sel');
  }
}

/* ══ 전역 등록 ══ */
Object.assign(window, {
  changeSrv, switchTab, switchMtab,
  filterPool, filterModal,
  clickItem, addRow, addHeaderRow, removeRow, moveRow, setActive, updateLabel, removeItem,
  openIconModal, closeModal, pickLabelIcon, clearLabelIcon, clearLicon,
  syncTitle, applyTheme, applyLayout, updateTag, clearAll, exportPNG,
  dStart, dOver, dLeave, dDrop, dOverEnd, dLeaveEnd, dDropEnd, rszLabel,
  toggleLicon, toggleLabel, toggleTag,
  setRarityFilter, setClassFilter, setMatFilter, applySvtFilter,
});
</script>
